apiVersion: apps/v1
kind: Deployment
metadata:
  name: chili-app
  labels:
    app.kubernetes.io/name: chili
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chili
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chili
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: app
          image: ghcr.io/chiliai/chili-app:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
