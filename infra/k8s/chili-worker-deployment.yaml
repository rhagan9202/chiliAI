apiVersion: apps/v1
kind: Deployment
metadata:
  name: chili-worker
  labels:
    app.kubernetes.io/name: chili
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chili
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chili
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/chiliai/chili-worker:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agent.coordinator"]
          ports:
            - name: health
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chili-config
            - secretRef:
                name: chili-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
