# Worker scaling note:
# Long-term, worker replicas should scale on Redis Stream pending-message depth
# via a custom-metrics adapter (e.g. KEDA's redis-streams scaler). That requires
# extra cluster setup (KEDA install + ScaledObject CRD) and is captured as
# future work. For now, scale on CPU as a coarse proxy.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chili-worker
  labels:
    app.kubernetes.io/name: chili
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chili-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
