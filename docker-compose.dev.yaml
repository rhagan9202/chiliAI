services:
  # ---------- Application containers ----------

  app:
    build:
      context: ./chili_app
      target: build
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./chili_app/src:/app/src
      - ./chili_app/public:/app/public
      - ./chili_app/index.html:/app/index.html
      - ./chili_app/vite.config.ts:/app/vite.config.ts
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
      - VITE_WS_PROXY_TARGET=ws://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chili-net

  api:
    build:
      context: ./backend
    command: >
      uvicorn api.app:create_app
      --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chili-object-data:/app/data
    environment:
      - CHILI_CONFIG_PATH=/app/config/defaults/medicare_fraud_dev.yaml
      - CHILI_KB_REPOSITORY_BACKEND=object_store
      - CHILI_EVENT_BUS_BACKEND=redis
      - CHILI_EVENT_BLOCK_MS=100
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - chili-net

  worker:
    build:
      context: ./backend
    command: python -m agent.coordinator
    volumes:
      - ./backend:/app
      - chili-object-data:/app/data
    environment:
      - CHILI_CONFIG_PATH=/app/config/defaults/medicare_fraud_dev.yaml
      - CHILI_EVENT_BUS_BACKEND=redis
      - CHILI_EVENT_BLOCK_MS=100
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - chili-net

  # ---------- Infrastructure services ----------

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chili-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=chili
      - POSTGRES_USER=chili
      - POSTGRES_PASSWORD=chili
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chili -d chili"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chili-net

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - chili-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chili-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chili-net

volumes:
  chili-object-data:
  redis-data:
  postgres-data:
  neo4j-data:
  qdrant-data:
  minio-data:

networks:
  chili-net:
    driver: bridge
