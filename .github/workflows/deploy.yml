name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: aks-fed-incubator-runners-ss
    environment: lower-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: actions/azure-login@v3
        with:
          creds: ${{ secrets.SPN_CREDS }}
          environment: 'AzureUSGovernment'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'code-starters/ui/package-lock.json'

      - name: Install dependencies
        working-directory: code-starters/ui
        run: npm ci

      - name: Build
        working-directory: code-starters/ui
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'code-starters/ui/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
