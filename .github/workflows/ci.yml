name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, typecheck, tests, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,neo4j,qdrant,openai,anthropic,s3,sentence-transformers,analytics]" \
            || pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with pyright
        run: pyright .

      - name: Run pytest with coverage gate
        run: pytest --cov --cov-report=xml --cov-report=term --cov-fail-under=85

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (fail on HIGH/CRITICAL)
        run: |
          pip-audit \
            --strict \
            --vulnerability-service=pypi \
            --ignore-vuln GHSA-0000-0000-0000 \
            || pip-audit --strict

  frontend:
    name: Frontend (lint, typecheck, tests, build, audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chili_app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('chili_app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint with ESLint
        run: npm run lint

      - name: Type-check with tsc
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build

      - name: Upload frontend dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: chili_app/dist
          if-no-files-found: warn

      - name: Run npm audit (fail on HIGH/CRITICAL)
        run: npm audit --audit-level=high
