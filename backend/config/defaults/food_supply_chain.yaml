domain:
  name: food_supply_chain
  display_name: "Food Supply Chain Monitoring"
  description: "Safety and compliance monitoring for food supply chain operations"

entities:
  - name: supplier
    display_label: "Supplier"
    icon: factory
    properties:
      supplier_id: { type: string, display: "Supplier ID", required: true }
      name: { type: string, display: "Name" }
      country: { type: string, display: "Country" }
      certification: { type: enum, display: "Certification", enum_values: ["organic", "fair_trade", "gmp", "haccp", "none"] }

  - name: shipment
    display_label: "Shipment"
    icon: truck
    properties:
      tracking_id: { type: string, display: "Tracking ID", required: true }
      weight_kg: { type: decimal, display: "Weight (kg)", min_value: 0 }
      ship_date: { type: date, display: "Ship Date", required: true }
      temperature_log: { type: list, display: "Temperature Log" }

  - name: inspection
    display_label: "Inspection"
    icon: clipboard
    properties:
      inspection_id: { type: string, display: "Inspection ID", required: true }
      result: { type: enum, display: "Result", enum_values: ["pass", "fail", "conditional"] }
      inspector: { type: string, display: "Inspector" }
      date: { type: date, display: "Inspection Date" }

  - name: facility
    display_label: "Facility"
    icon: building
    properties:
      facility_id: { type: string, display: "Facility ID", required: true }
      name: { type: string, display: "Name" }
      type: { type: string, display: "Facility Type" }

relationships:
  - name: shipped_by
    display_label: "Shipped By"
    source: shipment
    target: supplier

  - name: inspected_at
    display_label: "Inspected At"
    source: inspection
    target: facility

  - name: supplied_by
    display_label: "Supplied By"
    source: facility
    target: supplier

capabilities:
  timeseries: true
  gnn: false
  risk_scoring: true
  rag_chat: true
  explainability: false
  structured_ingestion: true

ingestion:
  chunking:
    strategy: recursive
    chunk_size: 800
    chunk_overlap: 160
    min_chunk_size: 50
  sources:
    - type: file_upload
      formats: [csv, json, pdf]
    - type: api_push
      format: json
      endpoint: /ingest/shipments

records:
  feeds:
    - name: shipments_feed
      record_type: shipment_record
      source: file_upload
      id_field: tracking_id
      record_schema:
        tracking_id: { type: string, display: "Tracking ID", required: true }
        supplier_id: { type: string, display: "Supplier ID", required: true }
        ship_date: { type: date, display: "Ship Date", required: true }
        spoilage_score: { type: decimal, display: "Spoilage Score", required: true, min_value: 0, max_value: 1 }
      entities:
        - entity_type: shipment
          id_field: tracking_id
          property_fields:
            tracking_id: tracking_id
            ship_date: ship_date
        - entity_type: supplier
          id_field: supplier_id
          property_fields:
            supplier_id: supplier_id
      relationships:
        - relationship_type: shipped_by
          source_entity_type: shipment
          target_entity_type: supplier
      observations:
        - metric_name: shipment_spoilage
          entity_type: shipment
          score_field: spoilage_score
          rationale: "Spoilage score derived from the structured shipments feed."

